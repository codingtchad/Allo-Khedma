version: '3.8'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: allo_khedma_db
    environment:
      POSTGRES_USER: allo_khedma_user
      POSTGRES_PASSWORD: password_secure
      POSTGRES_DB: allo_khedma
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allo_khedma_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API FastAPI
  backend:
    build:
      context: ./backend_api
      dockerfile: Dockerfile
    container_name: allo_khedma_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend_api:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://allo_khedma_user:password_secure@db:5432/allo_khedma
      SECRET_KEY: votre_secret_key_tres_long_et_aleatoire_changez_cette_valeur
      ADMIN_EMAIL: admin@allokhedma.com
      ADMIN_PASSWORD: Admin123!ChangeMe
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Admin Web (optionnel - à implémenter plus tard)
  # admin:
  #   build:
  #     context: ./admin_web
  #     dockerfile: Dockerfile
  #   container_name: allo_khedma_admin
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
